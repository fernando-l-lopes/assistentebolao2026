// NOTA SOBRE INTEGRAÇÃO FIFA / ATUALIZAÇÃO AUTOMÁTICA
// O app roda no browser do usuário (client-side React). Não há servidor próprio,
// portanto NÃO é possível:
//   1. Buscar dados diretamente do site da FIFA (bloqueio CORS + sem back-end)
//   2. Executar rotina automática diária sem o app aberto
// Solução viável implementada:
//   - Botão "🔄 Buscar Resultados (via Claude AI)" que usa a Anthropic API
//     para solicitar os resultados mais recentes e preenche automaticamente
//   - Todos os dados são persistidos na sessão (sessionStorage)
//   - Para atualização às 06h BRT com garantia, é necessário hospedar em
//     servidor com cron (ex: Vercel + cron job). Explico ao final do arquivo.
// ─────────────────────────────────────────────────────────────────────────────

// ═════════════════════════════════════════════════════════════════════════════
// REGRAS DE PONTUAÇÃO (conforme regulamento fornecido)
// Art.  ?: Placar exato                = 3 pts
// Art.  ?: Resultado certo (sem placar)= 1 pt
// Art. 13: Classificados por grupo
//   • Time palpitado se classificou (qualquer posição) = 1 pt
//   • Acertou também a posição exata                   = +1 pt extra (total 2 pts)
//   • Máximo por grupo: 6 pts (3 palpites × 2 pts)
//   • Par de Bolas: 2 palpites no mesmo jogo, AMBOS valem só placar exato.
//     Exato com qualquer um = 3 pts | nenhum exato = 0 pts (abdica da coluna)
// Art. 20: Carniça
//   • 1 ponto por cada gol marcado pelas seleções "carniça" na 1ª fase
// Especiais:
//   • Artilheiro correto               = 5 pts
//   • 1 finalista correto              = 5 pts | ambos = 10 pts
//   • Campeão correto                  = 20 pts
//   • Bingo Fácil                      = 1 pt/evento
//   • Bingo Médio                      = 3 pts/evento
//   • Bingo Difícil                    = 5 pts/evento
// ℹ️  Ajuste os valores em SCORING_CLASSIFICADOS se o regulamento divergir.
// ═════════════════════════════════════════════════════════════════════════════

// Regra Art. 13:
//   • Acertou que o time se classifica (qualquer posição palpitada) → 1 pt base
//   • Acertou a posição exata (além disso)                          → +1 pt extra

// SCORING ENGINE
// ─────────────────────────────────────────────────────────────────────────────
function norm(s){ return (s||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").trim(); }

// Aliases para variações de nomes usadas pelos participantes
const TEAM_ALIASES = {
  "c. do marfim": "costa do marfim",
  "c do marfim": "costa do marfim",
  "eua": "estados unidos",
  "usa": "estados unidos",
  "bosnia": "bosnia e herzegovina",
  "congo": "rd congo",
  "tchequi": "tchequia",
  "n. zelandia": "nova zelandia",
  "arabia": "arabia saudita",
};
function canonTeam(s){
  let n = norm(s);
  if(TEAM_ALIASES[n]) return TEAM_ALIASES[n];
  return n;
}
function teamsMatch(a,b){
  const na=canonTeam(a), nb=canonTeam(b);
  return na===nb||na.includes(nb)||nb.includes(na);
}

function scoreMatch(pal, real){
  if(!pal||pal[0]===null||pal[0]===undefined) return null;          // participante sem palpite
  if(!real||real[0]===null||real[1]===null) return null;            // jogo sem resultado
  if(pal[0]===real[0]&&pal[1]===real[1]) return 3;                  // placar exato
  return Math.sign(pal[0]-pal[1])===Math.sign(real[0]-real[1]) ? 1 : 0; // coluna
}

// Pontuação de um jogo considerando o Par de Bolas (regra oficial):
// • Sem PdB: placar exato=3 / coluna=1 / erro=0
// • Com PdB: o participante fez 2 palpites, AMBOS valem apenas placar exato.
//   Acertou o placar com qualquer um → 3 pts. Nenhum exato → 0 pts
//   (quem usa PdB abdica da pontuação de coluna).
function scoreMatchFull(name, mid, real){
  if(!real||real[0]===null||real[1]===null) return null;
  const pidx = P_NAMES.indexOf(name);
  if(pidx < 0) return null;
  const pal = (MATCH_PALPITES[mid]||[])[pidx];
  const pdbEntry = PAR_DE_BOLAS_PALPITES[mid];
  const pdb = pdbEntry ? pdbEntry[name] : null;
  if(pdb){
    const exact = p => p && p[0]===real[0] && p[1]===real[1];
    if(!pal && !pdb) return null;
    return (exact(pal) || exact(pdb)) ? 3 : 0;
  }
  return scoreMatch(pal, real);
}

function calcScore(name, state){
  const esp = ESPECIAIS[name]||{};
  const pidx = P_NAMES.indexOf(name);
  let match=0, matchCount=0, classif=0, bingo=0, carnica=0, artilheiro=0, finalistas=0, campeao=0, delcimarPts=0;
  const details=[];

  // ── Placares ──────────────────────────────────────────────────
  // match      = pontos (placar exato=3, coluna=1)
  // matchCount = número de jogos acertados (mostrado no card)
  // Jogos onde este participante é SACANEADO são excluídos aqui
  // (serão contabilizados negativamente na seção Delcimar)
  const sacGames = new Set(
    DELCIMAR_REVERSO
      .filter(function(r){ return r[1]===name; })
      .map(function(r){ return String(r[2]); })
  );
  for(const [mid] of JOGOS){
    if(sacGames.has(String(mid))) continue; // excluído — tratado no Delcimar
    const real = state.resultados[mid];
    const s = scoreMatchFull(name, mid, real);
    if(s!==null){ match+=s; if(s===3) matchCount++; } // matchCount = placares exatos apenas
  }

  // ── Classificados por grupo (Art. 13) ─────────────────────────
  // Regra: para cada time palpitado (pos 1º/2º/3º):
  //   +1 pt  se o time se classificou em qualquer posição
  //   +1 pt  extra se acertou a posição exata
  //   Máximo 2 pts por palpite, 6 pts por grupo (3 palpites × 2 pts)
  const cls = CLASSIFICADOS_PALPITES[name]||{};
  const realCls = state.classificados||{};
  const sc = SCORING_CLASSIFICADOS;

  for(const grp of Object.keys(GRUPOS)){
    const pGrp = cls[grp]||[];     // [palpite1º, palpite2º, palpite3º]
    const rGrp = realCls[grp]||{}; // {1:"Time", 2:"Time", 3:"Time"}
    if(!rGrp[1] && !rGrp[2]) continue; // grupo ainda não finalizado

    const real1 = rGrp[1]||"";
    const real2 = rGrp[2]||"";
    const real3 = rGrp[3]||"";
    // Conjunto de times que efetivamente se classificaram
    const classificados = [real1, real2, real3].filter(Boolean);

    // Avalia cada um dos 3 palpites de posição
    const posMap = [[pGrp[0], real1, "1º"], [pGrp[1], real2, "2º"], [pGrp[2], real3, "3º"]];
    for(const [palpite, realExato, pos] of posMap){
      if(!palpite) continue;
      const seClassificou = classificados.some(t => teamsMatch(palpite, t));
      if(!seClassificou) continue; // time não se classificou — 0 pts

      // +1 pt base por classificar
      classif += sc.classifica;
      const posExata = realExato && teamsMatch(palpite, realExato);
      if(posExata){
        // +1 pt extra por posição certa
        classif += sc.posicao_exata;
        details.push({l:`Gr.${grp} ${pos} exato: ${palpite}`, pts: sc.classifica + sc.posicao_exata});
      } else {
        details.push({l:`Gr.${grp} classif. (pos.errada): ${palpite}`, pts: sc.classifica});
      }
    }
  }

  // ── Delcimar Reverso (Art. 16) ───────────────────────────────
  // Regra correta: o sacaneado NÃO ganha os pontos do jogo visado.
  // Além disso, perde os pontos que teria ganho (vai para negativo).
  // O Delcimar ganha esses pontos.
  // Implementação: os jogos visados por Delcimar são excluídos do
  // loop de placares acima para o sacaneado, e contabilizados aqui.
  for(const [delc, sac, midD] of DELCIMAR_REVERSO){
    const real = state.resultados[midD] || state.resultados[String(midD)];
    if(!real) continue;
    const ptsSac = scoreMatchFull(sac, midD, real);
    if(ptsSac === null || ptsSac === 0) continue; // sacaneado errou — nada acontece

    if(name === delc){
      delcimarPts += ptsSac;
      details.push({l:`Delcimar: roubou ${ptsSac}pts de ${sac} (#${midD})`, pts: ptsSac});
    }
    if(name === sac){
      // Sacaneado: não ganha os pts do placar E ainda perde — resultado negativo
      delcimarPts -= ptsSac;
      details.push({l:`Sacaneado por ${delc}: −${ptsSac}pts (#${midD})`, pts: -ptsSac});
    }
  }

  // ── Carniça (Art. 20) — 1 pt por gol marcado ─────────────────
  const golosCarnica = state.golosCarnica||{};
  const c1gols = golosCarnica[norm(esp.c1)]||0;
  const c2gols = golosCarnica[norm(esp.c2)]||0;
  if(c1gols>0){ carnica+=c1gols; details.push({l:`Carniça ${esp.c1}: ${c1gols} gols`,pts:c1gols}); }
  if(c2gols>0){ carnica+=c2gols; details.push({l:`Carniça ${esp.c2}: ${c2gols} gols`,pts:c2gols}); }

  // ── Bingo ─────────────────────────────────────────────────────
  const picks = BINGO_PICKS[name]||[];
  for(const bid of picks){
    if((state.bingo && state.bingo[bid])){
      const evt = BINGO.find(e=>e.id===bid);
      if(evt){ bingo+=evt.pts; }
    }
  }

  // ── Artilheiro ────────────────────────────────────────────────
  if(state.artilheiro && esp.artilheiro && teamsMatch(state.artilheiro, esp.artilheiro)){
    artilheiro=5;
  }

  // ── Finalistas ────────────────────────────────────────────────
  if(state.finalista1 && state.finalista2 && esp.f1 && esp.f2){
    const rf=new Set([norm(state.finalista1),norm(state.finalista2)]);
    const hit=[norm(esp.f1),norm(esp.f2)].filter(p=>[...rf].some(r=>r===p||r.includes(p)||p.includes(r))).length;
    if(hit===2) finalistas=10;
    else if(hit===1) finalistas=5;
  }

  // ── Campeão — 20 pts (Art. correto) ──────────────────────────
  if(state.campeao && esp.campeao && teamsMatch(state.campeao, esp.campeao)){
    campeao=20;
  }

  const total=match+classif+bingo+carnica+artilheiro+finalistas+campeao+delcimarPts;
  return {total,match,matchCount,classif,bingo,carnica,artilheiro,finalistas,campeao,delcimarPts,details};
}

function GraficoTab({state}){
  const [modo,setModo]=useState("acumulado"); // "acumulado" | "diario"
  const [destaque,setDestaque]=useState(null);
  const [filtro,setFiltro]=useState("todos");

  // Calcula pontos por data a partir dos resultados em state
  const pontosNoDia=useMemo(()=>{
    const map={}; // nome -> { "DD/MM": pts }
    P_NAMES.forEach(function(n){ map[n]={}; });

    const add=function(n,d,v){
      if(!map[n][d]) map[n][d]=0;
      map[n][d]+=v;
    };

    const jogoPorId={};
    JOGOS.forEach(function(m){ jogoPorId[String(m[0])]=m; });

    const dataDe=function(mid){
      const jogo=jogoPorId[String(mid)];
      if(!jogo) return null;
      const partes=(jogo[1]||"").split(" ")[0].split("/");
      return (partes[0].length===1?"0"+partes[0]:partes[0])+"/"+(partes[1].length===1?"0"+partes[1]:partes[1]);
    };

    // Mapa de sacaneados: { nome -> Set(mid) }
    const sacGames={};
    P_NAMES.forEach(function(n){ sacGames[n]=new Set(); });
    DELCIMAR_REVERSO.forEach(function(row){ sacGames[row[1]].add(String(row[2])); });

    // Função para calcular pts de um participante num jogo (com Par de Bolas)
    const ptsJogo=function(n,mid,res){
      const pidx=P_NAMES.indexOf(n);
      const pal=(MATCH_PALPITES[mid]||[])[pidx];
      const pdbEntry=PAR_DE_BOLAS_PALPITES[mid];
      const pdb=pdbEntry?pdbEntry[n]:null;
      if(pdb){
        const exact=function(p){return p&&p[0]===res[0]&&p[1]===res[1];};
        return (exact(pal)||exact(pdb))?3:0;
      }
      const r=scoreMatch(pal,res);
      return r===null?0:r;
    };

    // 1. Pontos de placar/coluna — PULANDO jogos em que o participante é sacaneado
    Object.entries(state.resultados).forEach(function(entry){
      const mid=entry[0]; const res=entry[1];
      if(!res||!Array.isArray(res)) return;
      const d=dataDe(mid); if(!d) return;
      P_NAMES.forEach(function(n){
        if(sacGames[n].has(String(mid))) return; // será tratado no Step 2
        add(n, d, ptsJogo(n,mid,res));
      });
    });

    // 2. Delcimar: sacaneado NÃO ganhou (pulado acima) E ainda perde os pts → negativo
    //             delcimar GANHA os pts que o sacaneado perdeu
    Object.entries(state.resultados).forEach(function(entry){
      const mid=entry[0]; const res=entry[1];
      if(!res||!Array.isArray(res)) return;
      const d=dataDe(mid); if(!d) return;
      DELCIMAR_REVERSO.forEach(function(row){
        const delc=row[0]; const sac=row[1]; const jid=row[2];
        if(String(jid)!==String(mid)) return;
        const pts=ptsJogo(sac,mid,res);
        if(pts>0){
          add(sac,  d, -pts); // sacaneado fica negativo
          add(delc, d,  pts); // delcimar ganha
        }
      });
    });

    // 3. Bingo por dia (datas mapeadas pelos eventos conhecidos)
    const BINGO_DATAS={
      "f09":"13/06","m15":"13/06","f19":"12/06","m21":"13/06","m22":"13/06","f02":"11/06",
      "m01":"14/06","d01":"14/06","d02":"14/06",
    };
    Object.entries(state.bingo||{}).forEach(function(e){
      const bid=e[0]; const on=e[1]; if(!on) return;
      const evt=BINGO.find(function(b){return b.id===bid;}); if(!evt) return;
      const d=BINGO_DATAS[bid]; if(!d) return;
      P_NAMES.forEach(function(n){
        if((BINGO_PICKS[n]||[]).includes(bid)) add(n,d,evt.pts);
      });
    });

    // 4. Carniça: distribuída pelo dia do jogo em que o time marcou
    // Mapeamos cada time carniça ao último dia em que jogou (com resultado)
    const CARNICA_DIAS={
      "catar":"13/06",        // Catar jogou j8 em 13/06
      "curacao":"14/06",      // Curaçao jogou j10 em 14/06
      "nova zelandia":"15/06",// Nova Zelândia jogou j15 em 15/06
    };
    P_NAMES.forEach(function(n){
      const esp=ESPECIAIS[n]||{};
      ["c1","c2"].forEach(function(k){
        const time=(esp[k]||"").toLowerCase()
          .normalize("NFD").replace(/[\u0300-\u036f]/g,"")
          .replace(/\s+/g," ").trim();
        const gols=(state.golosCarnica||{})[time]||0;
        if(gols>0){
          const d=CARNICA_DIAS[time];
          if(d) add(n,d,gols);
        }
      });
    });

    // 5. Ajuste fino: qualquer delta restante (novos bingos sem data, etc.) vai ao último dia
    P_NAMES.forEach(function(n){
      const totalCalc=Object.values(map[n]).reduce(function(a,b){return a+b;},0);
      const totalReal=calcScore(n,state).total;
      const delta=totalReal-totalCalc;
      if(delta!==0){
        const diasN=Object.keys(map[n]).sort(function(a,b){
          const pa=a.split("/"); const pb=b.split("/");
          return (Number(pa[1])*100+Number(pa[0]))-(Number(pb[1])*100+Number(pb[0]));
        });
        const ultimoDia=diasN[diasN.length-1]||"15/06";
        map[n][ultimoDia]=(map[n][ultimoDia]||0)+delta;
      }
    });

    return map;
  },[state]);

  // Monta lista de dias ordenados
  const dias=useMemo(()=>{
    const set=new Set();
    P_NAMES.forEach(function(n){ Object.keys(pontosNoDia[n]).forEach(function(d){set.add(d);}); });
    return Array.from(set).sort(function(a,b){
      const [da,ma]=a.split("/"); const [db,mb]=b.split("/");
      return (Number(ma)*100+Number(da))-(Number(mb)*100+Number(db));
    });
  },[pontosNoDia]);

  // Monta dados do gráfico
  const chartData=useMemo(()=>{
    const inicio={dia:"Início"};
    P_NAMES.forEach(function(n){inicio[n]=0;});
    const rows=[inicio];
    let acc={};
    P_NAMES.forEach(function(n){acc[n]=0;});
    dias.forEach(function(d){
      const row={dia:d};
      P_NAMES.forEach(function(n){
        const pts=pontosNoDia[n][d]||0;
        if(modo==="acumulado"){
          acc[n]+=pts;
          row[n]=acc[n];
        } else {
          row[n]=pts;
        }
      });
      rows.push(row);
    });
    return rows;
  },[pontosNoDia,dias,modo]);

  const grupos={
    todos: P_NAMES,
    lideres: ["Barros","Jonathan","Vinícius","Juliana","Lehl","Renan Duce"],
    meio: ["Lucas","Rodolfo","Douglas","Mara","William","Nani","Serginho"],
    bottom: ["Fernando","Renatinha","Renan P.","Priscila"],
  };
  const visiveis=grupos[filtro]||P_NAMES;

  const CustomTooltip=function(props){
    const active=props.active; const payload=props.payload; const label=props.label;
    if(!active||!payload||!payload.length) return null;
    const sorted=[...payload].sort(function(a,b){return b.value-a.value;});
    return (
      <div style={{background:"#0f1523",border:"1px solid rgba(255,255,255,.12)",borderRadius:"10px",padding:"10px 14px",minWidth:"170px",maxHeight:"260px",overflowY:"auto"}}>
        <div style={{color:"#94a3b8",fontSize:"10px",fontWeight:700,marginBottom:"6px",textTransform:"uppercase"}}>{label}</div>
        {sorted.map(function(entry,i){
          return (
            <div key={i} style={{display:"flex",justifyContent:"space-between",gap:"12px",fontSize:"11px",marginBottom:"2px"}}>
              <span style={{color:entry.color,fontWeight:600}}>{entry.name}</span>
              <span style={{color:"#e2e8f0",fontWeight:800}}>{entry.value>0?"+":""}{entry.value}pts</span>
            </div>
          );
        })}
      </div>
    );
  };

  return (
    <div style={{display:"flex",flexDirection:"column",gap:"12px"}}>

      {/* Toggle modo */}
      <div style={{display:"flex",background:"rgba(255,255,255,.04)",borderRadius:"12px",padding:"3px",gap:"3px"}}>
        {[{id:"acumulado",l:"📈 Acumulado"},{id:"diario",l:"📊 Por dia"}].map(function(m){
          return (
            <button key={m.id} onClick={()=>setModo(m.id)} style={{flex:1,padding:"7px",borderRadius:"9px",border:"none",cursor:"pointer",fontWeight:700,fontSize:"11px",
              background:modo===m.id?"linear-gradient(135deg,#6366f1,#3b82f6)":"transparent",
              color:modo===m.id?"#fff":C.muted}}>
              {m.l}
            </button>
          );
        })}
      </div>

      {/* Filtro grupo */}
      <div style={{display:"flex",gap:"5px",flexWrap:"wrap"}}>
        {[{k:"todos",l:"Todos"},{k:"lideres",l:"🏆 Top 6"},{k:"meio",l:"🔄 Pelotão"},{k:"bottom",l:"🔦 Bottom"}].map(function(g){
          return (
            <button key={g.k} onClick={()=>setFiltro(g.k)} style={{padding:"4px 12px",borderRadius:"20px",border:"none",cursor:"pointer",fontWeight:700,fontSize:"10px",
              background:filtro===g.k?"#4f46e5":"rgba(255,255,255,.05)",color:filtro===g.k?"#fff":C.muted}}>
              {g.l}
            </button>
          );
        })}
      </div>

      {/* Legenda clicável */}
      <div style={{display:"flex",flexWrap:"wrap",gap:"5px"}}>
        {P_NAMES.map(function(p,i){
          const isAtivo=visiveis.includes(p);
          const isDestaqueAtivo=destaque===p;
          return (
            <button key={p} onClick={()=>setDestaque(destaque===p?null:p)}
              style={{display:"flex",alignItems:"center",gap:"4px",padding:"3px 9px",borderRadius:"20px",cursor:"pointer",
                border:isDestaqueAtivo?"1px solid "+CHART_COLORS[i]:"1px solid rgba(255,255,255,.07)",
                background:isDestaqueAtivo?"rgba(255,255,255,.06)":"transparent",
                opacity:isAtivo?1:0.25}}>
              <span style={{width:"7px",height:"7px",borderRadius:"50%",background:CHART_COLORS[i],display:"inline-block",flexShrink:0}}/>
              <span style={{fontSize:"10px",color:isDestaqueAtivo?CHART_COLORS[i]:C.muted,fontWeight:isDestaqueAtivo?700:400}}>{p}</span>
            </button>
          );
        })}
      </div>

      {/* Gráfico */}
      <div style={{background:"rgba(13,17,23,.9)",borderRadius:"14px",padding:"16px 4px 10px",border:`1px solid ${C.border}`}}>
        <ResponsiveContainer width="100%" height={340}>
          <LineChart data={chartData} margin={{top:4,right:16,left:-16,bottom:4}}>
            <CartesianGrid strokeDasharray="3 3" stroke="rgba(255,255,255,.04)"/>
            <XAxis dataKey="dia" tick={{fill:C.muted,fontSize:10,fontWeight:600}} axisLine={{stroke:"#1a2235"}} tickLine={false}/>
            <YAxis tick={{fill:C.muted,fontSize:10}} axisLine={false} tickLine={false} tickFormatter={function(v){return v+"pt";}} domain={[function(min){return Math.min(min,-1);}, 'auto']}/>
            <ReferenceLine y={0} stroke="rgba(255,255,255,.18)" strokeDasharray="4 4"/>
            <Tooltip content={CustomTooltip}/>
            {P_NAMES.map(function(p,i){
              const isVis=visiveis.includes(p);
              const isDest=destaque===p;
              const opacity=destaque?(isDest?1:0.06):(isVis?1:0.1);
              return (
                <Line key={p} type="monotone" dataKey={p}
                  stroke={CHART_COLORS[i]}
                  strokeWidth={isDest?3:1.5}
                  dot={{r:isDest?5:2,fill:CHART_COLORS[i],strokeWidth:0}}
                  activeDot={{r:6,strokeWidth:0}}
                  opacity={opacity}/>
              );
            })}
          </LineChart>
        </ResponsiveContainer>
      </div>

      {/* Tabela de pontuação por dia (modo diário) */}
      {modo==="diario"&&(
        <div style={{background:"rgba(13,17,23,.9)",borderRadius:"14px",border:`1px solid ${C.border}`,overflow:"hidden"}}>
          <div style={{overflowX:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:"11px",minWidth: dias.length>5? dias.length*80+"px":"100%"}}>
              <thead>
                <tr style={{borderBottom:`1px solid ${C.border}`}}>
                  <th style={{padding:"8px 10px",textAlign:"left",color:C.muted,fontWeight:700,fontSize:"10px",textTransform:"uppercase",position:"sticky",left:0,background:"#0d1117",zIndex:2}}>Participante</th>
                  {dias.map(function(d){
                    return <th key={d} style={{padding:"8px 8px",textAlign:"center",color:C.accent,fontWeight:700,fontSize:"10px",whiteSpace:"nowrap"}}>{d}</th>;
                  })}
                </tr>
              </thead>
              <tbody>
                {(()=>{
                  // Ordenar por total DESC para o dia mais recente
                  const ultimoDia=dias[dias.length-1];
                  const sorted=[...P_NAMES].sort(function(a,b){
                    return (pontosNoDia[b][ultimoDia]||0)-(pontosNoDia[a][ultimoDia]||0);
                  });
                  return sorted.map(function(p,i){
                    const pidx=P_NAMES.indexOf(p);
                    return (
                      <tr key={p} style={{borderBottom:`1px solid rgba(255,255,255,.04)`,background:i%2===0?"transparent":"rgba(255,255,255,.02)"}}>
                        <td style={{padding:"7px 10px",position:"sticky",left:0,background:i%2===0?"#0d1117":"#0f1320",zIndex:1}}>
                          <span style={{display:"inline-block",width:"8px",height:"8px",borderRadius:"50%",background:CHART_COLORS[pidx],marginRight:"6px",verticalAlign:"middle"}}/>
                          <span style={{color:C.text,fontWeight:600}}>{p}</span>
                        </td>
                        {dias.map(function(d){
                          const v=pontosNoDia[p][d]||0;
                          const color=v>0?"#4ade80":v<0?"#f87171":C.muted;
                          const label=v===0?"—":(v>0?"+"+v:v);
                          return <td key={d} style={{padding:"7px 8px",textAlign:"center",color:color,fontWeight:v!==0?700:400}}>{label}</td>;
                        })}
                      </tr>
                    );
                  });
                })()}
              </tbody>
            </table>
          </div>
        </div>
      )}

      <div style={{fontSize:"9px",color:"#2a3450",textAlign:"center"}}>
        {modo==="acumulado"?"Pontuação acumulada ao longo dos dias":"Pontos conquistados em cada dia"}
        {" · "}Clique em um nome para destacar · {dias.length} dias jogados
      </div>
    </div>
  );
}

function App(){
  const [state,setState]=useState(loadState);
  const [tab,setTab]=useState("ranking");
  const [expanded,setExpanded]=useState(null);
  const [toast,setToast]=useState("");
  const [adminSec,setAdminSec]=useState("special");

  const flash=(msg)=>{ setToast(msg); setTimeout(()=>setToast(""),3000); };

  const update=(patch)=>{
    const next={...state,...patch,lastUpdated:new Date().toISOString()};
    setState(next); saveState(next); flash("✅ Salvo!");
  };

  const ranked=useMemo(()=>{
    const arr=P_NAMES.map(n=>({name:n,esp:ESPECIAIS[n]||{},score:calcScore(n,state)}))
      .sort((a,b)=>{
        // a) Total DESC
        if(b.score.total!==a.score.total) return b.score.total-a.score.total;
        // b) Placares exatos (cnt) DESC
        if(b.score.matchCount!==a.score.matchCount) return b.score.matchCount-a.score.matchCount;
        // c) Extras DESC = classificados + carniça + finalistas + campeão + artilheiro (SEM bingo, SEM delcimar)
        const extA=a.score.classif+a.score.carnica+a.score.finalistas+a.score.campeao+a.score.artilheiro;
        const extB=b.score.classif+b.score.carnica+b.score.finalistas+b.score.campeao+b.score.artilheiro;
        if(extB!==extA) return extB-extA;
        // d) Bingo (pts) DESC
        if(b.score.bingo!==a.score.bingo) return b.score.bingo-a.score.bingo;
        // e) Sorteio → Nome ASC (determinístico)
        return a.name.localeCompare(b.name);
      });
    return arr.map((x,i)=>({...x,rank:i+1,isLast:i===arr.length-1}));
  },[state]);

  const maxPts=(ranked[0] && ranked[0].score.total)||1;
  const jogosFeitos=Object.keys(state.resultados).filter(k=>state.resultados[k]!==null).length;
  const bingoOn=Object.values(state.bingo||{}).filter(Boolean).length;

  // ── AI fetch results ─────────────────────────────────────────

  return(
    <div style={{minHeight:"100vh",background:C.bg,color:C.text,fontFamily:"'Segoe UI',system-ui,sans-serif"}}>

      {/* ─── HEADER ────────────────────────────────────────── */}
      <div style={{background:"linear-gradient(160deg,#0d1226 0%,#1a1040 60%,#0d1226 100%)",borderBottom:`1px solid ${C.border}`,padding:"16px 16px 0"}}>
        {/* geometric accent */}
        <div style={{position:"absolute",top:0,left:0,right:0,height:"180px",overflow:"hidden",pointerEvents:"none",opacity:.03,backgroundImage:"repeating-linear-gradient(45deg,#fff 0,#fff 1px,transparent 0,transparent 50%)",backgroundSize:"18px 18px"}}/>
        <div style={{maxWidth:"560px",margin:"0 auto",position:"relative"}}>
          <div style={{textAlign:"center",paddingBottom:"16px"}}>
            {/* Title */}
            <div style={{fontSize:"28px",fontWeight:900,letterSpacing:"-0.5px",background:"linear-gradient(135deg,#fbbf24 0%,#f97316 50%,#ef4444 100%)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",lineHeight:1.1}}>
              ASSISTENTE DA TAUBA - BOLÃO 2026
            </div>
            <div style={{fontSize:"11px",color:C.muted,letterSpacing:"0.2em",textTransform:"uppercase",marginTop:"2px"}}>Bolão MSNF · Primeira Fase</div>
            {/* status pill */}
            <div style={{display:"inline-flex",alignItems:"center",gap:"5px",background:"rgba(255,255,255,.04)",border:`1px solid ${C.border}`,borderRadius:"99px",padding:"3px 12px",marginTop:"8px",fontSize:"10px",color:C.muted}}>
              <span style={{width:"6px",height:"6px",borderRadius:"50%",background:state.lastUpdated?"#4ade80":"#4b5775",flexShrink:0}}/>
              {state.lastUpdated ? `Atualizado ${new Date(state.lastUpdated).toLocaleString("pt-BR")}` : "Sem dados ainda"}
            </div>
          </div>
          {/* stats */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:"6px",paddingBottom:"12px"}}>
            {[
              {icon:"👥",v:P_NAMES.length,l:"Participantes"},
              {icon:"⚽",v:`${jogosFeitos}/${JOGOS.length}`,l:"Jogos"},
              {icon:"🎯",v:`${bingoOn}/${BINGO.length}`,l:"Bingo"},
              {icon:"🏆",v:(ranked[0] && ranked[0].name).split(" ")[0]||"—",l:"Líder"},
            ].map(s=>(
              <div key={s.l} style={{background:"rgba(255,255,255,.03)",border:`1px solid ${C.border}`,borderRadius:"10px",padding:"8px 4px",textAlign:"center"}}>
                <div style={{fontSize:"16px"}}>{s.icon}</div>
                <div style={{fontWeight:800,fontSize:"13px",color:C.text}}>{s.v}</div>
                <div style={{fontSize:"9px",color:C.muted,textTransform:"uppercase",letterSpacing:"0.05em"}}>{s.l}</div>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* ─── TABS ──────────────────────────────────────────── */}
      <div style={{position:"sticky",top:0,zIndex:20,background:"rgba(7,9,15,.95)",backdropFilter:"blur(10px)",borderBottom:`1px solid ${C.border}`}}>
        <div style={{display:"flex",gap:"4px",maxWidth:"560px",margin:"0 auto",padding:"7px 12px"}}>
          {[{id:"ranking",i:"🏆",l:"Ranking"},{id:"jogos",i:"⚽",l:"Jogos"},{id:"bingo",i:"🎯",l:"Bingo"},{id:"grafico",i:"📈",l:"Gráfico"},{id:"admin",i:"⚙️",l:"Admin"}].map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,padding:"7px 2px",borderRadius:"9px",border:"none",cursor:"pointer",fontWeight:700,fontSize:"11px",transition:"all .15s",
              background:tab===t.id?"linear-gradient(135deg,#6366f1,#3b82f6)":"rgba(255,255,255,.03)",
              color:tab===t.id?"#fff":C.muted,boxShadow:tab===t.id?"0 1px 8px rgba(99,102,241,.35)":"none"}}>
              <div>{t.i}</div><div>{t.l}</div>
            </button>
          ))}

      {/* ─── CONTENT ───────────────────────────────────────── */}
      <div style={{maxWidth:"560px",margin:"0 auto",padding:"14px 12px 80px"}}>

        {/* ════ RANKING ════ */}
        {tab==="ranking"&&(
          <div style={{display:"flex",flexDirection:"column",gap:"8px"}}>
            {ranked.map(({name,esp,score,rank,isLast})=>{
              const isExp=expanded===name;
              const mx=maxPts||1;
              const pct=Math.round((score.total/mx)*100);
              const acnt=rank===1?C.gold:rank===2?C.silver:rank===3?C.bronze:C.border;
              const medal=rank===1?"🥇":rank===2?"🥈":rank===3?"🥉":null;
              const bingoPicks=BINGO_PICKS[name]||[];
              return(
                <div key={name} onClick={()=>setExpanded(isExp?null:name)}
                  style={{borderRadius:"14px",border:`1px solid ${rank<=3?acnt:C.border}`,background:C.card,cursor:"pointer",overflow:"hidden",boxShadow:rank===1?"0 0 16px rgba(251,191,36,.1)":"none"}}>
                  {/* row */}
                  <div style={{display:"flex",alignItems:"center",gap:"10px",padding:"12px 12px 8px"}}>
                    <div style={{width:"36px",textAlign:"center",flexShrink:0}}>
                      {medal?<span style={{fontSize:"20px"}}>{medal}</span>:isLast?<span style={{fontSize:"18px"}} title="Lanterna">🔦</span>:<span style={{fontSize:"14px",fontWeight:900,color:C.muted}}>#{rank}</span>}
                    </div>
                    <div style={{width:"34px",height:"34px",borderRadius:"50%",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,fontSize:"14px",
                      background:rank===1?"linear-gradient(135deg,#fbbf24,#f59e0b)":rank===2?"linear-gradient(135deg,#94a3b8,#64748b)":rank===3?"linear-gradient(135deg,#d97706,#b45309)":"linear-gradient(135deg,#1e293b,#0f172a)",
                      color:rank<=3?"#0f172a":C.muted}}>
                      {name[0].toUpperCase()}

                    <div style={{flex:1,minWidth:0}}>
                      <div style={{display:"flex",alignItems:"center",gap:"6px"}}>
                        <span style={{fontWeight:800,fontSize:"14px",color:C.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{name}</span>
                        {rank===1&&<span style={{fontSize:"9px",background:"rgba(251,191,36,.15)",color:C.gold,border:"1px solid rgba(251,191,36,.25)",padding:"1px 6px",borderRadius:"99px",fontWeight:700,flexShrink:0}}>LÍDER</span>}
                      </div>
                      <div style={{fontSize:"10px",color:C.muted,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",marginTop:"1px"}}>

                      </div>
                      <div style={{marginTop:"5px",height:"3px",borderRadius:"99px",background:"rgba(255,255,255,.05)"}}>
                        <div style={{height:"3px",borderRadius:"99px",width:`${pct}%`,background:`linear-gradient(90deg,${rank<=3?acnt:"#6366f1"},${rank===1?"#fb923c":"#8b5cf6"})`,transition:"width .5s"}}/>
                      </div>
                    </div>
                    <div style={{textAlign:"right",flexShrink:0}}>
                      <div style={{fontWeight:900,fontSize:"24px",lineHeight:1,color:C.text}}>{score.total}</div>
                      <div style={{fontSize:"9px",color:C.muted}}>pts</div>
                    </div>
                    <span style={{color:C.muted,fontSize:"11px"}}>{isExp?"▲":"▼"}</span>
                  </div>
                  {/* expanded */}
                  {isExp&&(
                    <div style={{borderTop:`1px solid ${C.border}`,padding:"12px",background:"rgba(0,0,0,.3)"}}>
                      {/* breakdown */}
                      {(()=>{

                          <div style={{display:"flex",flexWrap:"wrap",gap:"4px"}}>
                            {score.details.map((d,i)=>(
                              <span key={i} style={{fontSize:"10px",fontWeight:700,background:"rgba(250,204,21,.08)",color:C.gold,border:"1px solid rgba(250,204,21,.15)",borderRadius:"6px",padding:"2px 7px"}}>+{d.pts} {d.l}</span>
                            ))}
                          </div>
                        </div>
                      )}
                      {/* classificados palpites */}
                      <div style={{marginBottom:"10px"}}>
                        <div style={{fontSize:"10px",color:C.muted,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:"5px"}}>Palpites Classificados</div>
                        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:"3px"}}>
                          {Object.keys(GRUPOS).map(grp=>{
                            const pGrp=(CLASSIFICADOS_PALPITES[name]||{})[grp]||[];
                            const rGrp=(state.classificados||{})[grp]||{};
                            return(
                              <div key={grp} style={{background:"rgba(255,255,255,.02)",borderRadius:"6px",padding:"4px 5px"}}>
                                <div style={{fontSize:"9px",color:C.accent,fontWeight:700,marginBottom:"2px"}}>GRP {grp}</div>
                                {[0,1,2].map(i=>{
                                  const t=pGrp[i]; if(!t)return null;
                                  const real=rGrp[i+1];
                                  const ok=real&&teamsMatch(t,real);
                                  return (<div key={i} style={{fontSize:"9px",color:ok?C.green:real?C.red:C.muted,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{i+1}º {t}{ok?" ✓":real?" ✗":""}</div>);
                                })}
                              </div>
                            );
                          })}
                        </div>
                      </div>
                      {/* bingo picks */}
                      <div>
                        <div style={{fontSize:"10px",color:C.muted,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:"5px"}}>Cartela Bingo ({bingoPicks.length}/16)</div>
                        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"2px",maxHeight:"160px",overflowY:"auto"}}>
                          {bingoPicks.map(bid=>{
                            const evt=BINGO.find(e=>e.id===bid);
                            const hit=!!(state.bingo && state.bingo[bid]);
                            if(!evt)return null;
                            return(
                              <div key={bid} style={{display:"flex",gap:"4px",fontSize:"9px",padding:"3px 5px",borderRadius:"5px",background:hit?"rgba(74,222,128,.06)":"rgba(255,255,255,.02)",border:hit?"1px solid rgba(74,222,128,.12)":"1px solid transparent",alignItems:"flex-start"}}>
                                <span style={{flexShrink:0}}>{hit?"✅":"⬜"}</span>
                                <span style={{color:hit?"#86efac":C.muted,lineHeight:1.3,flex:1}}>{evt.text}</span>
                                <span style={{flexShrink:0,fontWeight:700,color:evt.cat==="F"?C.catF:evt.cat==="M"?C.catM:C.catD,marginLeft:"2px"}}>+{evt.pts}</span>
                              </div>
                            );
                          })}
                        </div>
                      </div>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        )}

        {/* ════ JOGOS ════ */}
        {tab==="jogos"&&<JogosTab state={state} onUpdate={update}/>}

        {/* ════ BINGO ════ */}
        {tab==="bingo"&&(
          <div style={{display:"flex",flexDirection:"column",gap:"12px"}}>
            {["F","M","D"].map(cat=>(
              <div key={cat} style={{background:C.card,border:`1px solid ${cat==="F"?C.catF:cat==="M"?C.catM:C.catD}20`,borderRadius:"14px",overflow:"hidden"}}>
                <div style={{padding:"9px 12px",background:CAT_BG[cat],borderBottom:`1px solid ${cat==="F"?C.catF:cat==="M"?C.catM:C.catD}25`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <span style={{fontWeight:800,fontSize:"12px",color:cat==="F"?C.catF:cat==="M"?C.catM:C.catD}}>{CAT_LABEL[cat]}</span>
                  <span style={{fontSize:"10px",color:C.muted}}>{BINGO.filter(e=>e.cat===cat&&(state.bingo && state.bingo[e.id])).length}/{BINGO.filter(e=>e.cat===cat).length} realizados</span>
                </div>
                <div style={{padding:"6px"}}>
                  {BINGO.filter(e=>e.cat===cat).map(evt=>{
                    const hit=!!(state.bingo && state.bingo[evt.id]);
                    const picks=P_NAMES.filter(n=>(BINGO_PICKS[n]||[]).includes(evt.id)).length;
                    return(
                      <div key={evt.id} style={{display:"flex",gap:"8px",padding:"6px 5px",borderRadius:"7px",background:hit?"rgba(74,222,128,.04)":"transparent",borderBottom:`1px solid ${C.border}33`,alignItems:"flex-start"}}>
                        <span style={{fontSize:"13px",flexShrink:0}}>{hit?"✅":"⬜"}</span>
                        <span style={{flex:1,fontSize:"11px",color:hit?"#86efac":C.muted,lineHeight:1.4}}>{evt.text}</span>
                        <div style={{textAlign:"right",flexShrink:0}}>
                          <div style={{fontWeight:700,fontSize:"11px",color:cat==="F"?C.catF:cat==="M"?C.catM:C.catD}}>+{evt.pts}</div>
                          <div style={{fontSize:"9px",color:"#2d3748"}}>{picks}x</div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            ))}
          </div>
        )}

        {/* ════ ADMIN ════ */}
        {tab==="grafico"&&<GraficoTab state={state}/>}
        {tab==="admin"&&<AdminTab state={state} onUpdate={update} adminSec={adminSec} setAdminSec={setAdminSec}/>}

      </div>

      {/* ─── FOOTER NOTE ───────────────────────────────────── */}
      <div style={{position:"fixed",bottom:0,left:0,right:0,background:"rgba(7,9,15,.95)",borderTop:`1px solid ${C.border}`,padding:"6px 12px",textAlign:"center",fontSize:"9px",color:"#1e2a40"}}>
        Assistente da Tauba · Bolão MSNF 2026 · Atualização manual via botão IA ou aba Admin · Classificados: 1pt se classifica + 1pt extra se posição exata (máx 2pts/palpite)
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// JOGOS TAB
// ─────────────────────────────────────────────────────────────────────────────
function JogosTab({state,onUpdate}){
  const [grp,setGrp]=useState("A");
  const [editing,setEditing]=useState(null);
  const [ev,setEv]=useState({h:"",a:""});
  const C2={bg:"rgba(15,21,35,.9)",border:"rgba(255,255,255,.07)",muted:"#4b5775",text:"#e2e8f0",green:"#4ade80",yellow:"#fbbf24",red:"#f87171",accent:"#6366f1"};

  const save=()=>{
    const h=parseInt(ev.h),a=parseInt(ev.a);
    const val=(isNaN(h)||isNaN(a)||h<0||a<0)?null:[h,a];
    onUpdate({resultados:{...state.resultados,[editing]:val}});
    setEditing(null);
  };

  const jogosGrp=JOGOS.filter(m=>m[4]===grp);

  const [seedCopied,setSeedCopied]=useState(false);
  const [showSeed,setShowSeed]=useState(false);

  const gerarSeed=()=>{
    const res=state.resultados||{};
    const bng=state.bingo||{};
    const golos=state.golosCarnica||{};
    const resEntries=Object.entries(res)
      .filter(function(e){return e[1]&&Array.isArray(e[1]);})
      .sort(function(a,b){
        const na=a[0]==="29C"?29.5:Number(a[0]);
        const nb=b[0]==="29C"?29.5:Number(b[0]);
        return na-nb;
      });
    const resLines=resEntries.map(function(e){
      const mid=e[0]; const v=e[1];
      const jogo=JOGOS.find(function(m){return String(m[0])===String(mid);});
      const home=jogo?jogo[2]:"?"; const away=jogo?jogo[3]:"?"; const data=jogo?jogo[1]:"";
      return '    "'+mid+'": ['+v[0]+','+v[1]+'],  // '+home+' '+v[0]+'×'+v[1]+' '+away+' ('+data+')';
    });
    const bingoLines=Object.entries(bng)
      .filter(function(e){return e[1];})
      .map(function(e){
        const bid=e[0];
        const evt=BINGO.find(function(b){return b.id===bid;});
        return '    "'+bid+'": true,  // ✅ '+(evt?evt.text:bid);
      });
    const golosLines=Object.entries(golos)
      .filter(function(e){return (e[1]||0)>0;})
      .map(function(e){return '    "'+e[0]+'": '+e[1]+',';});
    return [
      'const SEED_RESULTS = {',
      '  resultados: {',
      resLines.join('\n'),
      '  },',
      '  bingo: {',
      bingoLines.join('\n'),
      '  },',
      '  golosCarnica: {',
      golosLines.join('\n'),
      '  },',
      '};'
    ].join('\n');
  };

  const copiarSeed=()=>{
    const seed=gerarSeed();
    const fallback=()=>{
      // Fallback: seleciona o textarea e executa document.execCommand
      const ta=document.getElementById("seed-textarea");
      if(ta){
        ta.select();
        try{
          document.execCommand("copy");
          setSeedCopied(true);
          setTimeout(function(){setSeedCopied(false);},3000);
        }catch(e){
          // último recurso: abre alert com o conteúdo
          alert("Copie manualmente o conteúdo da caixa de texto acima.");
        }
      }
    };
    if(navigator.clipboard&&navigator.clipboard.writeText){
      navigator.clipboard.writeText(seed).then(function(){
        setSeedCopied(true);
        setTimeout(function(){setSeedCopied(false);},3000);
      }).catch(function(){
        fallback();
      });
    } else {
      fallback();
    }
  };

  const exportScores=()=>{
    const scores={};
    P_NAMES.forEach(function(n){ scores[n]=calcScore(n,state).total; });
    const out=JSON.stringify({scores:scores},null,2);
    try{
      navigator.clipboard.writeText(out).then(function(){
        alert("Pontuações copiadas!\nCole no artefato da 2ª fase para importar.");
      });
    }catch(err){ alert(out); }
  };

  return(
    <div>
      <div style={{display:"flex",flexWrap:"wrap",gap:"5px",marginBottom:"12px"}}>
        {Object.keys(GRUPOS).map(g=>{
          const total=JOGOS.filter(m=>m[4]===g).length;
          const done=JOGOS.filter(m=>m[4]===g&&state.resultados[m[0]]).length;
          const complete=done===total&&total>0;
          return (
            <button key={g} onClick={()=>setGrp(g)} style={{padding:"5px 10px",borderRadius:"99px",border:"none",cursor:"pointer",fontWeight:700,fontSize:"11px",position:"relative",
              background:grp===g?"linear-gradient(135deg,#6366f1,#3b82f6)":complete?"rgba(74,222,128,.1)":"rgba(255,255,255,.04)",
              color:grp===g?"#fff":complete?"#4ade80":C2.muted,
              border:complete&&grp!==g?"1px solid rgba(74,222,128,.25)":"1px solid transparent"}}>
              {complete?"✓ ":""}Grp {g}{done>0&&!complete?` ${done}/${total}`:""}
            </button>
          );
        })}
      </div>
      <div style={{marginBottom:"10px",display:"flex",flexDirection:"column",gap:"6px"}}>
        <button onClick={()=>setShowSeed(function(v){return !v;})} style={{background:"linear-gradient(135deg,#6366f1,#3b82f6)",color:"#fff",border:"none",borderRadius:"9px",padding:"8px 16px",fontWeight:700,fontSize:"12px",cursor:"pointer",width:"100%"}}>
          {showSeed?"▲ Fechar":"📋 Gerar SEED_RESULTS para atualizar o arquivo"}
        </button>
        {showSeed&&(
          <div style={{background:"rgba(10,12,24,0.97)",border:"1px solid rgba(99,102,241,.3)",borderRadius:"10px",padding:"10px",display:"flex",flexDirection:"column",gap:"8px"}}>
            <div style={{fontSize:"10px",color:"#818cf8",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.06em"}}>
              Bloco SEED_RESULTS atualizado · {Object.keys(state.resultados||{}).length} resultados · {Object.values(state.bingo||{}).filter(Boolean).length} bingos
            </div>
            <textarea id="seed-textarea" readOnly value={gerarSeed()} style={{width:"100%",minHeight:"160px",background:"#050810",border:"1px solid rgba(255,255,255,.07)",borderRadius:"8px",color:"#7dd3fc",fontSize:"10px",fontFamily:"monospace",padding:"8px",resize:"vertical",boxSizing:"border-box",lineHeight:1.5}}/>
            <button onClick={copiarSeed} style={{background:seedCopied?"linear-gradient(135deg,#16a34a,#15803d)":"linear-gradient(135deg,#4f46e5,#2563eb)",color:"#fff",border:"none",borderRadius:"8px",padding:"8px",fontWeight:800,fontSize:"12px",cursor:"pointer",transition:"background .3s"}}>
              {seedCopied?"✅ Copiado! Cole no JSX substituindo o SEED_RESULTS antigo":"📄 Copiar para Clipboard"}
            </button>
            <div style={{fontSize:"9px",color:"#4b5775",lineHeight:1.5}}>
              Substitua o bloco <code style={{color:"#a78bfa"}}>const SEED_RESULTS = {"{ ... }"}</code> no arquivo JSX pelo conteúdo acima e salve. Todos os resultados, bingos e gols de carniça ficam permanentes.
            </div>
          </div>
        )}
        <button onClick={exportScores} style={{background:"linear-gradient(135deg,#059669,#10b981)",color:"#fff",border:"none",borderRadius:"9px",padding:"8px 16px",fontWeight:700,fontSize:"12px",cursor:"pointer",width:"100%"}}>📤 Exportar Pontuações para a 2ª Fase</button>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:"6px"}}>
        {jogosGrp.map(m=>{
          const mid=m[0];
          const real=state.resultados[mid];
          const isEd=editing===mid;
          const palpitesRow=MATCH_PALPITES[mid]||[];
          return(
            <div key={mid} style={{background:C2.bg,border:`1px solid ${C2.border}`,borderRadius:"12px",overflow:"hidden"}}>
              <div style={{display:"flex",alignItems:"center",padding:"9px 10px",gap:"6px"}}>
                <span style={{fontSize:"9px",color:C2.muted,background:"rgba(255,255,255,.03)",padding:"2px 6px",borderRadius:"99px",flexShrink:0}}>#{mid}·{m[1]}</span>
                {(()=>{
                  const delcs=DELCIMAR_REVERSO.filter(function(row){return String(row[2])===String(mid);});
                  if(delcs.length===0) return null;
                  return (
                    <span title={delcs.map(([d,s])=>`${d}→${s}`).join(", ")} style={{fontSize:"8px",color:"#f87171",background:"rgba(248,113,113,.1)",border:"1px solid rgba(248,113,113,.25)",padding:"1px 5px",borderRadius:"99px",fontWeight:700,flexShrink:0}}>🎯 {delcs.length}× DELCIMAR</span>
                  );
                })()}
                <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",gap:"6px"}}>
                  <span style={{fontWeight:700,fontSize:"12px",color:C2.text,textAlign:"right",flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{m[2]}</span>
                  {isEd?(
                    <div style={{display:"flex",alignItems:"center",gap:"3px",flexShrink:0}}>
                      <input value={ev.h} onChange={e=>setEv(v=>({...v,h:e.target.value}))} style={{width:"30px",textAlign:"center",background:"rgba(255,255,255,.08)",border:"1px solid rgba(255,255,255,.15)",borderRadius:"5px",color:"#fff",fontSize:"14px",fontWeight:700,padding:"3px 2px"}}/>
                      <span style={{color:C2.muted,fontSize:"10px",fontWeight:700}}>x</span>
                      <input value={ev.a} onChange={e=>setEv(v=>({...v,a:e.target.value}))} style={{width:"30px",textAlign:"center",background:"rgba(255,255,255,.08)",border:"1px solid rgba(255,255,255,.15)",borderRadius:"5px",color:"#fff",fontSize:"14px",fontWeight:700,padding:"3px 2px"}}/>
                    </div>
                  ):(
                    <div style={{flexShrink:0}}>
                      {real?(
                        <span style={{fontWeight:900,fontSize:"13px",color:C2.green,background:"rgba(74,222,128,.08)",border:"1px solid rgba(74,222,128,.18)",padding:"3px 9px",borderRadius:"7px"}}>{real[0]} x {real[1]}</span>
                      ):(
                        <span style={{fontSize:"11px",color:"#1e2a40",padding:"3px 6px"}}>— x —</span>
                      )}
                    </div>
                  )}
                  <span style={{fontWeight:700,fontSize:"12px",color:C2.text,textAlign:"left",flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{m[3]}</span>
                </div>
                {isEd?(
                  <div style={{display:"flex",gap:"3px",flexShrink:0}}>
                    <button onClick={save} style={{background:"#166534",color:"#4ade80",border:"1px solid #166534",borderRadius:"5px",padding:"3px 8px",fontWeight:700,cursor:"pointer",fontSize:"11px"}}>✓</button>
                    <button onClick={()=>setEditing(null)} style={{background:"rgba(255,255,255,.05)",color:C2.muted,border:"none",borderRadius:"5px",padding:"3px 7px",cursor:"pointer",fontSize:"11px"}}>✗</button>
                  </div>
                ):(
                  <button onClick={()=>{setEditing(mid);const r=state.resultados[mid];setEv(r?{h:String(r[0]),a:String(r[1])}:{h:"",a:""}); }} style={{background:"rgba(99,102,241,.12)",color:"#818cf8",border:"1px solid rgba(99,102,241,.2)",borderRadius:"7px",padding:"3px 9px",cursor:"pointer",fontSize:"10px",fontWeight:600,flexShrink:0}}>
                    {real?"Editar":"Inserir"}
                  </button>
                )}
              </div>
              {/* delcimar outcomes */}
              {real&&(()=>{
                const delcs=DELCIMAR_REVERSO.filter(function(row){return String(row[2])===String(mid);});
                if(delcs.length===0) return null;
                return (
                  <div style={{borderTop:`1px solid ${C2.border}`,padding:"5px 10px",display:"flex",flexDirection:"column",gap:"2px"}}>
                    {delcs.map(([delc,sac])=>{
                      const sacIdx=P_NAMES.indexOf(sac);
                      const palSac=(MATCH_PALPITES[mid]||[])[sacIdx];
                      const pts=scoreMatch(palSac,real);
                      const fired=pts!==null&&pts>0;
                      return (
                        <div key={delc+sac} style={{fontSize:"9px",color:fired?"#f87171":"#3a4358",fontWeight:fired?700:400}}>
                          🎯 {delc} → {sac}: {fired?`${delc} roubou ${pts}pt${pts>1?"s":""} de ${sac}!`:pts===0?`${sac} errou — nada acontece`:"aguardando"}
                        </div>
                      );
                    })}
                  </div>
                );
              })()}
              {/* palpites mini */}
              {real&&palpitesRow.length>0&&(
                <div style={{borderTop:`1px solid ${C2.border}`,padding:"5px 8px",display:"flex",flexWrap:"wrap",gap:"3px"}}>
                  {palpitesRow.map((pal,i)=>{
                    const nm=P_NAMES[i]; if(!nm)return null;
                    const pdbE=PAR_DE_BOLAS_PALPITES[mid];
                    const pdb=pdbE?pdbE[nm]:null;
                    if(!pal&&!pdb) return (
                      <div key={nm} style={{fontSize:"9px",padding:"2px 5px",borderRadius:"4px",background:"rgba(255,255,255,.02)",border:"1px solid rgba(255,255,255,.05)",color:"#3a4358",fontWeight:600,lineHeight:1.4}}>
                        {nm.split(" ")[0]}: —
                      </div>
                    );
                    const s=scoreMatchFull(nm,mid,real);
                    const [bg,bc,col]=s===3?["rgba(74,222,128,.1)","rgba(74,222,128,.25)",C2.green]:s===1?["rgba(251,191,36,.08)","rgba(251,191,36,.2)",C2.yellow]:["rgba(248,113,113,.06)","rgba(248,113,113,.15)",C2.red];
                    const palTxt = pdb
                      ? `${pal?pal[0]+"×"+pal[1]:"—"} (${pdb[0]}×${pdb[1]})`
                      : `${pal[0]}×${pal[1]}`;
                    return(
                      <div key={nm} style={{fontSize:"9px",padding:"2px 5px",borderRadius:"4px",background:bg,border:`1px solid ${bc}`,color:col,fontWeight:600,lineHeight:1.4}}>
                        {pdb?"🎱 ":""}{nm.split(" ")[0]}: {palTxt} {s===3?"✓✓":s===1?"✓":"✗"}
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          );
        })}
        {/* classificados do grupo */}
        <ClassificadosEditor key={grp} grp={grp} state={state} onUpdate={onUpdate}/>
      </div>
    </div>
  );
}

function ClassificadosEditor({grp,state,onUpdate}){
  const rGrp=(state.classificados||{})[grp]||{};
  const [v,setV]=useState({1:rGrp[1]||"",2:rGrp[2]||"",3:rGrp[3]||""});
  const save=()=>onUpdate({classificados:{...state.classificados,[grp]:{1:v[1],2:v[2],3:v[3]}}});
  return(
    <div style={{background:"rgba(99,102,241,.06)",border:"1px solid rgba(99,102,241,.15)",borderRadius:"12px",padding:"10px"}}>
      <div style={{fontSize:"10px",color:"#818cf8",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:"6px"}}>Classificados Grupo {grp}</div>
      <div style={{fontSize:"9px",color:"#4b5775",marginBottom:"8px",lineHeight:1.5}}>
        Cada time palpitado que se classificar vale 1 pt. Se a posição (1º/2º/3º) também estiver certa, +1 pt extra. Máximo: 2 pts por palpite, 6 pts por grupo.
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:"6px",marginBottom:"8px"}}>
        {[1,2,3].map(pos=>(
          <div key={pos}>
            <label style={{fontSize:"9px",color:"#4b5775",display:"block",marginBottom:"3px"}}>{pos}º lugar</label>
            <input value={v[pos]} onChange={e=>setV(x=>({...x,[pos]:e.target.value}))}
              style={{width:"100%",background:"rgba(255,255,255,.05)",border:"1px solid rgba(255,255,255,.08)",borderRadius:"6px",padding:"5px 7px",color:"#e2e8f0",fontSize:"11px",outline:"none",boxSizing:"border-box"}}/>
          </div>
        ))}
      </div>
      <button onClick={save} style={{width:"100%",background:"linear-gradient(135deg,#6366f1,#3b82f6)",color:"#fff",border:"none",borderRadius:"8px",padding:"7px",fontWeight:700,fontSize:"11px",cursor:"pointer"}}>Salvar Classificados Grupo {grp}</button>
    </div>
  );
}

// ADMIN TAB
// ─────────────────────────────────────────────────────────────────────────────
const ALL_TEAMS=["México","África do Sul","Coreia do Sul","Tchéquia","Canadá","Bósnia","Catar","Suíça","Brasil","Marrocos","Haiti","Escócia","EUA","Paraguai","Austrália","Turquia","Alemanha","Curaçao","Costa do Marfim","Equador","Holanda","Japão","Suécia","Tunísia","Bélgica","Egito","Irã","Nova Zelândia","Espanha","Cabo Verde","Arábia Saudita","Uruguai","França","Senegal","Iraque","Noruega","Argentina","Argélia","Áustria","Jordânia","Portugal","RD Congo","Uzbequistão","Colômbia","Inglaterra","Croácia","Gana","Panamá"];

function AdminTab({state,onUpdate,adminSec,setAdminSec}){
  const [sp,setSp]=useState({artilheiro:state.artilheiro||"",finalista1:state.finalista1||"",finalista2:state.finalista2||"",campeao:state.campeao||""});
  const [localBingo,setLocalBingo]=useState({...state.bingo});
  const [golos,setGolos]=useState(state.golosCarnica||{});

  const C2={card:"rgba(15,21,35,.9)",border:"rgba(255,255,255,.07)",muted:"#4b5775",text:"#e2e8f0",accent:"#6366f1"};
  const secs=[{id:"special",l:"🏆 Especiais"},{id:"bingo",l:"🎯 Bingo"},{id:"carnica",l:"🗑️ Carniça"}];

  return(
    <div>
      <div style={{display:"flex",gap:"5px",marginBottom:"12px"}}>
        {secs.map(s=>(
          <button key={s.id} onClick={()=>setAdminSec(s.id)} style={{flex:1,padding:"7px 4px",borderRadius:"9px",border:"none",cursor:"pointer",fontWeight:700,fontSize:"10px",background:adminSec===s.id?"linear-gradient(135deg,#6366f1,#3b82f6)":"rgba(255,255,255,.04)",color:adminSec===s.id?"#fff":C2.muted}}>
            {s.l}
          </button>
        ))}
      </div>

      {adminSec==="special"&&(
        <div style={{background:C2.card,border:`1px solid ${C2.border}`,borderRadius:"14px",padding:"14px",display:"flex",flexDirection:"column",gap:"10px"}}>
          <div style={{fontSize:"10px",color:C2.muted,textTransform:"uppercase",letterSpacing:"0.06em"}}>Palpites especiais — insira os resultados ao fim da 1ª fase</div>
          <div style={{fontSize:"11px",color:"#a5b4fc",background:"rgba(99,102,241,.07)",border:"1px solid rgba(99,102,241,.18)",borderRadius:"10px",padding:"10px 12px",lineHeight:1.8}}>
            <div style={{fontWeight:700,color:"#c7d2fe",marginBottom:"4px"}}>📋 Como funciona</div>
            <div>Preencha os 4 campos abaixo com os resultados reais ao término da 1ª fase e clique em <strong>Salvar</strong>. A pontuação é aplicada automaticamente para todos os participantes.</div>
            <div style={{marginTop:"8px",display:"grid",gridTemplateColumns:"1fr 1fr",gap:"3px 12px"}}>
              <div>🏆 Campeão correto → <strong style={{color:"#fbbf24"}}>20 pts</strong></div>
              <div>⚽ Artilheiro correto → <strong style={{color:"#fbbf24"}}>5 pts</strong></div>
              <div>🥇🥈 Ambos finalistas → <strong style={{color:"#fbbf24"}}>10 pts</strong></div>
              <div>🥇 ou 🥈 Um finalista → <strong style={{color:"#fbbf24"}}>5 pts</strong></div>
            </div>
            <div style={{marginTop:"6px",fontSize:"10px",color:"#6366f1"}}>ℹ️ A ordem dos finalistas não importa. Grafia tolerante a acentos e maiúsculas.</div>
          </div>
          {[{l:"Campeão 🏆",k:"campeao",ph:"Ex: Espanha"},{l:"Artilheiro ⚽",k:"artilheiro",ph:"Ex: Mbappé"},{l:"Finalista 1",k:"finalista1",ph:"Ex: Espanha"},{l:"Finalista 2",k:"finalista2",ph:"Ex: França"}].map(f=>(
            <div key={f.k}>
              <label style={{fontSize:"10px",color:C2.muted,textTransform:"uppercase",letterSpacing:"0.06em",display:"block",marginBottom:"3px"}}>{f.l}</label>
              <input value={sp[f.k]} onChange={e=>setSp(v=>({...v,[f.k]:e.target.value}))} placeholder={f.ph}
                style={{width:"100%",background:"rgba(255,255,255,.05)",border:"1px solid rgba(255,255,255,.09)",borderRadius:"8px",padding:"8px 10px",color:C2.text,fontSize:"13px",outline:"none",boxSizing:"border-box"}}/>
            </div>
          ))}
          <button onClick={()=>onUpdate({artilheiro:sp.artilheiro,finalista1:sp.finalista1,finalista2:sp.finalista2,campeao:sp.campeao})} style={{background:"linear-gradient(135deg,#6366f1,#3b82f6)",color:"#fff",border:"none",borderRadius:"9px",padding:"10px",fontWeight:800,fontSize:"13px",cursor:"pointer"}}>Salvar Especiais</button>
        </div>
      )}

      {adminSec==="bingo"&&(
        <div style={{display:"flex",flexDirection:"column",gap:"10px"}}>
          <div style={{fontSize:"11px",color:"#a5b4fc",background:"rgba(99,102,241,.07)",border:"1px solid rgba(99,102,241,.18)",borderRadius:"10px",padding:"10px 12px",lineHeight:1.8}}>
            <div style={{fontWeight:700,color:"#c7d2fe",marginBottom:"4px"}}>📋 Como funciona</div>
            <div>Cada participante escolheu 16 eventos para montar sua cartela de bingo. Marque aqui os eventos que <strong>de fato ocorreram</strong> durante a 1ª fase. A pontuação é aplicada apenas para quem tinha o evento na cartela.</div>
            <div style={{marginTop:"8px",display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"3px"}}>
              <div style={{color:"#38bdf8"}}>🟦 Fácil → <strong>1 pt</strong></div>
              <div style={{color:"#fbbf24"}}>🟨 Médio → <strong>3 pts</strong></div>
              <div style={{color:"#f87171"}}>🟥 Difícil → <strong>5 pts</strong></div>
            </div>
          </div>
          {["F","M","D"].map(cat=>(
            <div key={cat} style={{background:C2.card,border:`1px solid ${cat==="F"?C.catF:cat==="M"?C.catM:C.catD}20`,borderRadius:"12px",overflow:"hidden"}}>
              <div style={{padding:"7px 10px",background:CAT_BG[cat]}}>
                <span style={{fontWeight:800,fontSize:"11px",color:cat==="F"?C.catF:cat==="M"?C.catM:C.catD}}>{CAT_LABEL[cat]}</span>
              </div>
              <div style={{padding:"6px"}}>
                {BINGO.filter(e=>e.cat===cat).map(evt=>(
                  <label key={evt.id} style={{display:"flex",alignItems:"center",gap:"7px",padding:"5px 5px",borderRadius:"6px",cursor:"pointer",background:localBingo[evt.id]?"rgba(74,222,128,.05)":"transparent",marginBottom:"1px"}}>
                    <input type="checkbox" checked={!!localBingo[evt.id]} onChange={()=>setLocalBingo(v=>({...v,[evt.id]:!v[evt.id]}))} style={{accentColor:"#4ade80",width:"13px",height:"13px",flexShrink:0}}/>
                    <span style={{flex:1,fontSize:"10px",color:localBingo[evt.id]?"#86efac":C2.muted}}>{evt.text}</span>
                    <span style={{fontSize:"10px",fontWeight:700,color:cat==="F"?C.catF:cat==="M"?C.catM:C.catD,flexShrink:0}}>+{evt.pts}</span>
                  </label>
                ))}
              </div>
            </div>
          ))}
          <button onClick={()=>onUpdate({bingo:localBingo})} style={{background:"linear-gradient(135deg,#4ade80,#16a34a)",color:"#fff",border:"none",borderRadius:"9px",padding:"10px",fontWeight:800,fontSize:"13px",cursor:"pointer"}}>Salvar Bingo</button>
        </div>
      )}

      {adminSec==="carnica"&&(
        <div style={{background:C2.card,border:`1px solid ${C2.border}`,borderRadius:"14px",padding:"14px"}}>
          <div style={{fontSize:"10px",color:C2.muted,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:"6px"}}>Carniça — gols marcados na 1ª fase</div>
          <div style={{fontSize:"11px",color:"#fdba74",background:"rgba(251,146,60,.07)",border:"1px solid rgba(251,146,60,.18)",borderRadius:"10px",padding:"10px 12px",lineHeight:1.8,marginBottom:"10px"}}>
            <div style={{fontWeight:700,color:"#fed7aa",marginBottom:"4px"}}>📋 Como funciona</div>
            <div>Cada participante escolheu 2 seleções <em>"carniça"</em> — times considerados azarões. A cada gol marcado por uma dessas seleções durante toda a 1ª fase, o participante que a escolheu ganha <strong>1 ponto</strong>.</div>
            <div style={{marginTop:"6px"}}>Use os botões <strong>+</strong> e <strong>−</strong> para registrar o total de gols de cada seleção e clique em <strong>Salvar</strong>.</div>
            <div style={{marginTop:"6px",fontSize:"10px",color:"#f97316"}}>ℹ️ Informe o total acumulado ao fim da 1ª fase, não por jogo.</div>
          </div>
          {/* Show relevant carniça teams across all participants */}
          {Array.from(new Set(P_NAMES.flatMap(n=>[(ESPECIAIS[n] && ESPECIAIS[n].c1),(ESPECIAIS[n] && ESPECIAIS[n].c2)]).filter(Boolean))).sort().map(team=>{
            const k=norm(team);
            return(
              <div key={team} style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"8px"}}>
                <span style={{flex:1,fontSize:"12px",color:C2.text}}>{team}</span>
                <span style={{fontSize:"10px",color:C2.muted}}>quem escolheu: {P_NAMES.filter(n=>norm((ESPECIAIS[n] && ESPECIAIS[n].c1))===k||norm((ESPECIAIS[n] && ESPECIAIS[n].c2))===k).map(n=>n.split(" ")[0]).join(", ")}</span>
                <div style={{display:"flex",alignItems:"center",gap:"4px"}}>
                  <button onClick={()=>setGolos(v=>({...v,[k]:Math.max(0,(v[k]||0)-1)}))} style={{width:"24px",height:"24px",borderRadius:"5px",border:"none",background:"rgba(255,255,255,.07)",color:C2.text,cursor:"pointer",fontWeight:700}}>−</button>
                  <span style={{fontWeight:900,fontSize:"16px",color:"#fb923c",minWidth:"24px",textAlign:"center"}}>{golos[k]||0}</span>
                  <button onClick={()=>setGolos(v=>({...v,[k]:(v[k]||0)+1}))} style={{width:"24px",height:"24px",borderRadius:"5px",border:"none",background:"rgba(255,255,255,.07)",color:C2.text,cursor:"pointer",fontWeight:700}}>+</button>
                </div>
              </div>
            );
          })}
          <button onClick={()=>onUpdate({golosCarnica:golos})} style={{width:"100%",background:"linear-gradient(135deg,#fb923c,#f97316)",color:"#fff",border:"none",borderRadius:"9px",padding:"10px",fontWeight:800,fontSize:"13px",cursor:"pointer",marginTop:"8px"}}>Salvar Gols Carniça</button>
        </div>
      )}
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
</html>
